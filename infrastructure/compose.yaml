name: planthor-webapi-infrastructure

services:

  mongodb1:
    image: mongo:8.3
    container_name: mongodb1
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb1_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb2:
    image: mongo:8.3
    container_name: mongodb2
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongodb2_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb3-arbiter:
    image: mongo:8.3
    container_name: mongodb3-arbiter
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------
  # NOTE: The mongo-setup service is designed to run ONCE and exit.
  # It initializes the MongoDB replica set if it hasn't been already.
  # The `restart: "no"` directive ensures it doesn't stay running.
  # Seeing this container in an "Exited (0)" state is EXPECTED and HEALTHY.
  # ---------------------------------------------------------
  mongo-setup:
    image: mongo:8.3
    depends_on:
      mongodb1:
        condition: service_healthy
      mongodb2:
        condition: service_healthy
      mongodb3-arbiter:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"
    volumes:
      - ./mongo-setup.js:/mongo-setup.js:ro
    entrypoint: ["mongosh", "--host", "mongodb1:27017", "--file", "/mongo-setup.js"]

  mongo-express:
    image: mongo-express:latest
    depends_on:
      mongodb1:
        condition: service_healthy
      mongodb2:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb1
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_URL: mongodb://mongodb1:27017,mongodb2:27017/?replicaSet=rs0
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - ${MONGO_EXPRESS_PORT:-8081}:8081
    networks:
      - app_network

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${KC_DB_NAME:-keycloak}
      POSTGRES_USER: ${KC_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-Planthor_123}
    ports:
      - ${KC_DB_PORT:-5432}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USER:-keycloak} -d ${KC_DB_NAME:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app_network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    command: >
      start-dev
      --import-realm
      --health-enabled=true
      --metrics-enabled=true
      --http-port=8180
    environment:
      # Admin credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-Planthor_123}
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/${KC_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KC_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-Planthor_123}
      # Hostname (adjust for production)
      # KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_PORT:-8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      # Log level
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}
    ports:
      - "${KC_PORT:-8180}:8180"
    volumes:
      # Realm JSON files placed here are auto-imported on startup
      - ./keycloak/processed_realms:/opt/keycloak/data/import:ro
      # Optional: custom themes
      # - ./keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  mongodb1_data:
    driver: local
  mongodb2_data:
    driver: local
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  app_network:
    driver: bridge
