name: Code Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  coverage:
    name: Run Coverage
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Restore dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Run coverage code
        run: |
          dotnet build --no-incremental
          # Coverlet report for Sonar
          dotnet test --no-build --results-directory ./coverage-report/ --collect:"XPlat Code Coverage;Format=lcov,opencover"
          dotnet reportgenerator -reports:"coverage-report/**/coverage.opencover.xml" -targetdir:"./coverage-report/" -reporttypes:"MarkdownSummary"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report/*

      - name: Code coverage summarize
        run : |
          echo "$(cat coverage-report/Summary.md)" >> $GITHUB_STEP_SUMMARY

  sonar-scan:
    name: Run SonarScanner
    runs-on: ubuntu-22.04
    needs: [ coverage ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      - name: Cache SonarScanner
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('./.github/workflows/qac.yml') }}

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage-report

      - name: Set Sonar PR params
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "SONAR_PR_PARAMS=/d:sonar.pullrequest.key=$PR_NUMBER /d:sonar.pullrequest.branch=$HEAD_REF /d:sonar.pullrequest.base=$BASE_REF" >> $GITHUB_ENV

      - name: Sonar Analytics
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet sonarscanner begin \
          /k:"Planthor_PlanthorWebApi" \
          /o:"planthor" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.sources="./src" \
          /d:sonar.tests="./tests" \
          /d:sonar.exclusions="**/wwwroot/lib/**,**/obj/**,**/bin/**" \
          /d:sonar.test.exclusions="**/wwwroot/lib/**" \
          /d:sonar.cs.opencover.reportsPaths="coverage-report/**/coverage.opencover.xml" \
          $SONAR_PR_PARAMS
          dotnet restore
          dotnet build --no-incremental
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
