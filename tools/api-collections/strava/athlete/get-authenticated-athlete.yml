info:
  name: Get Authenticated Athlete
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/athlete"
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
